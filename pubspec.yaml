name: aura
description: Your personal spiritual companion — offline, always.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local storage (fully offline)
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Background tasks (sleep-trigger scheduling)
  workmanager: ^0.5.2

  # Permissions
  permission_handler: ^11.3.0

  # Google Fonts (bundled at build time — no network calls at runtime)
  google_fonts: ^6.1.0

  # Date/time utilities
  intl: ^0.19.0

  timezone: ^0.9.4
  lat_lng_to_timezone: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts: []
